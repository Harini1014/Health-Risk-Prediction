<!DOCTYPE html>
<html>
<head>
    <title>Health Risk Prediction</title>

    <style>
        body {
            background: linear-gradient(to right, #0f172a, #1e293b);
            font-family: Arial;
            text-align: center;
            color: white;
        }

        h1 {
            color: #22c55e;
            margin-top: 30px;
        }

        .container {
            background-color: #1e293b;
            padding: 25px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 20px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }

        input, select {
            margin: 10px;
            padding: 10px;
            width: 220px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        input:focus {
            border: 2px solid #22c55e;
        }

        .btn {
            background-color: #22c55e;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #16a34a;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: #facc15;
            font-weight: bold;
        }
    </style>

</head>

<body>

<h1>Health Risk Prediction</h1>

<div class="container">
<form action="/predict" method="post">

    <input type="number" name="respiratory_rate" placeholder="Respiratory Rate" required><br>
    <input type="number" name="oxygen_saturation" placeholder="Oxygen Saturation" required><br>
    <input type="number" name="o2_scale" placeholder="O2 Scale" required><br>
    <input type="number" name="systolic_bp" placeholder="Systolic BP" required><br>
    <input type="number" name="heart_rate" placeholder="Heart Rate" required><br>
    <input type="number" step="0.1" name="temperature" placeholder="Temperature" required><br>

    <!-- Consciousness Dropdown -->
    <select name="consciousness" required>
    <option value="">Select Consciousness</option>
    <option value="A">Alert (A)</option>
    <option value="P">Pain (P)</option>
</select>

    <!-- Oxygen -->
    <select name="on_oxygen" required>
    <option value="">On Oxygen?</option>
    <option value="No">No</option>
    <option value="Yes">Yes</option>
</select>

    <input type="submit" value="Predict" class="btn">

</form>

<div class="result">
    {{ prediction_text }}
</div>

</div>

</body>
</html>
